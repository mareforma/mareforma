name: Tests

# Run on every push and every PR, plus manual dispatch from the Actions
# tab. The prior config triggered only on `main`, which meant feature
# branches (where all dev actually happens) never got pytest on a clean
# checkout — that's how `test_canonical.py` shipped with a hardcoded
# absolute path that only resolved on one machine.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  examples:
    # Smoke-test the LangChain quickstart examples end-to-end. These are
    # what every first-time reader of the repo will run; if any break,
    # the next negative review writes itself. Only examples 01-04 — 05
    # needs OPENAI_API_KEY + a 21 GB MedeaDB download.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install langchain-core

      - name: Example 01 — API walkthrough
        run: python examples/01_api_walkthrough/01_api_walkthrough.py

      - name: Example 02 — compounding agents
        run: python examples/02_compounding_agents/02_compounding_agents.py

      - name: Example 03 — documented contestation
        run: python examples/03_documented_contestation/03_documented_contestation.py

      - name: Example 04 — private data, public findings
        run: python examples/04_private_data_public_findings/04_private_data_public_findings.py
